<!DOCTYPE html>
<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Listner</title>
    <link rel="stylesheet" href="style.css">
</head>
<style>
    body{
        color: #000;
    }
    .changed-btn {
        background-color: black;
        color: white;
        border: none;
        outline: none;
        padding: 5px;
        border-radius: 3px;
        font-size: 1.2rem;
        font-weight: 700;
    }

    p {
        color: #000;
    }
</style>
<body>
    <main>
        <p>Event Listner</p>  
        <button id="btn-click">click</button>
        <div class="changed-btn">CHNAGE COLOR</div>

        <form>
            <input type="text" id="input-text" placeholder="Type something...">
            <label for="input-text">Enter text:</label>
        </form>
    </main>
    <script src="event.js"></script>
</body>
</html>
